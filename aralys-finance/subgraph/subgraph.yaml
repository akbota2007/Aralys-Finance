specVersion: 1.0.0
description: Aralys Finance — DeFi super-app subgraph
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum/contract
    name: AMMFactory
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"  # TODO: fill after deploy
      abi: AMMFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./mappings/factory.ts
      entities: [Pair]
      abis:
        - name: AMMFactory
          file: ./abis/AMMFactory.json
        - name: AMMPair
          file: ./abis/AMMPair.json
      eventHandlers:
        - event: PairCreated(indexed address,indexed address,address,uint256)
          handler: handlePairCreated

  - kind: ethereum/contract
    name: AralysGovernor
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"  # TODO
      abi: AralysGovernor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./mappings/governor.ts
      entities: [Proposal, Vote]
      abis:
        - name: AralysGovernor
          file: ./abis/AralysGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted

templates:
  - kind: ethereum/contract
    name: AMMPair
    network: arbitrum-sepolia
    source:
      abi: AMMPair
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./mappings/pair.ts
      entities: [Pair, Swap, LiquidityEvent]
      abis:
        - name: AMMPair
          file: ./abis/AMMPair.json
      eventHandlers:
        - event: Swap(indexed address,uint256,uint256,uint256,uint256,indexed address)
          handler: handleSwap
        - event: Mint(indexed address,uint256,uint256)
          handler: handleMint
        - event: Burn(indexed address,uint256,uint256,indexed address)
          handler: handleBurn
        - event: Sync(uint112,uint112)
          handler: handleSync
