type Pair @entity(immutable: false) {
  id: ID!                    # pair address
  token0: Bytes!
  token1: Bytes!
  reserve0: BigInt!
  reserve1: BigInt!
  totalSupply: BigInt!
  swaps: [Swap!]! @derivedFrom(field: "pair")
  liquidityEvents: [LiquidityEvent!]! @derivedFrom(field: "pair")
  createdAtBlock: BigInt!
}

type Swap @entity(immutable: true) {
  id: ID!                    # tx hash + log index
  pair: Pair!
  sender: Bytes!
  to: Bytes!
  amount0In: BigInt!
  amount1In: BigInt!
  amount0Out: BigInt!
  amount1Out: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
}

type LiquidityEvent @entity(immutable: true) {
  id: ID!
  pair: Pair!
  provider: Bytes!
  type: String!              # "MINT" | "BURN"
  amount0: BigInt!
  amount1: BigInt!
  liquidity: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
}

type Proposal @entity(immutable: false) {
  id: ID!                    # proposalId
  proposer: Bytes!
  description: String!
  state: String!             # Pending | Active | Canceled | Defeated | Succeeded | Queued | Expired | Executed
  forVotes: BigInt!
  againstVotes: BigInt!
  abstainVotes: BigInt!
  startBlock: BigInt!
  endBlock: BigInt!
  votes: [Vote!]! @derivedFrom(field: "proposal")
}

type Vote @entity(immutable: true) {
  id: ID!
  proposal: Proposal!
  voter: Bytes!
  support: Int!              # 0=against, 1=for, 2=abstain
  weight: BigInt!
  reason: String
  timestamp: BigInt!
}
