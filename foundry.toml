[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./" }]
gas_reports = ["AMMPair", "YieldVault", "LendingPool", "AralysGovernor"]
verbosity = 2

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 32 }

[profile.coverage]
via_ir = false  # coverage doesn't play well with IR

[fuzz]
runs = 256
seed = "0x1"

[invariant]
runs = 64
depth = 32
fail_on_revert = false

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC}"
optimism_sepolia = "${OPTIMISM_SEPOLIA_RPC}"
mainnet = "${MAINNET_RPC}"

[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
